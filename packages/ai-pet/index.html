<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Pet</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main id="app">
      <div id="pet-stage">
        <div id="pet-canvas-wrap">
          <canvas id="pet-canvas" aria-label="desktop pet"></canvas>
          <button
            type="button"
            id="pet-scale-handle"
            class="pet-scale-handle"
            aria-label="拖动缩放宠物"
            title="拖动缩放宠物"
          >
            <span class="pet-scale-handle__icon" aria-hidden="true">
              <svg
                viewBox="0 0 1024 1024"
                width="12"
                height="12"
                fill="currentColor"
              >
                <path
                  d="M1008.128 614.4a25.6 25.6 0 0 0-27.648 5.632l-142.848 142.848L259.072 186.88 401.92 43.52A25.6 25.6 0 0 0 384 0h-358.4a25.6 25.6 0 0 0-25.6 25.6v358.4a25.6 25.6 0 0 0 43.52 17.92l143.36-142.848 578.048 578.048-142.848 142.848a25.6 25.6 0 0 0 17.92 43.52h358.4a25.6 25.6 0 0 0 25.6-25.6v-358.4a25.6 25.6 0 0 0-15.872-25.088z"
                ></path>
              </svg>
            </span>
          </button>
        </div>
        <div id="text-bubbles" class="text-bubbles"></div>
      </div>
      <p id="pet-title" class="sr-only"></p>
      <p id="error" hidden></p>
      <menu id="context-menu" hidden>
        <button type="button" data-action="quit">退出</button>
      </menu>
    </main>
  </body>
</html>
