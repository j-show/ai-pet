[package]
name = "ai-pet"
version = "1.0.0"
description = "Codex-style desktop pet powered by Tauri"
authors = ["jshow"]
edition = "2021"

[lib]
name = "ai_pet_lib"
crate-type = ["rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["protocol-asset", "macos-private-api"] }
tauri-plugin-deep-link = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-app-kit = { version = "0.3", features = ["NSView", "NSWindow"] }
objc2-web-kit = { version = "0.3", features = ["WKWebView"] }
